<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Web Final Drive</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
    
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            transparent: true 
        });

        // 載入模型本體
        const modelUrl = './models/Q版動態貼圖_鹿聆半夏/Q版動態貼圖_鹿聆半夏 _v2.model3.json?v=force_update';
        // 動作檔的直接路徑
        const motionUrl = './models/Q版動態貼圖_鹿聆半夏/15.打招呼(Greet).motion3?v=force_update';

        PIXI.live2d.Live2DModel.from(modelUrl).then((model) => {
            app.stage.addChild(model);
            
            model.anchor.set(0.5, 0.5);
            model.x = window.innerWidth / 2;
            model.y = window.innerHeight / 2;
            const scale = Math.min(window.innerWidth / model.width, window.innerHeight / model.height) * 0.8;
            model.scale.set(scale);
            
            // 🚀 【終極核心】直接讀取動作檔案並載入模型
            fetch(motionUrl)
                .then(response => response.json())
                .then(motionJson => {
                    // 強行將動作檔塞入模型的自訂動作管理員中
                    const motionManager = model.internalModel.motionManager;
                    const definition = {
                        "File": "15.打招呼(Greet).motion3",
                        "FadeInTime": 0.5,
                        "FadeOutTime": 0.5
                    };
                    
                    // 建立網頁專用的動作物件
                    const live2dMotion = PIXI.live2d.Live2DCubismMotion.create(motionJson, definition);
                    
                    // 定義一個隨時可以呼叫的播放功能
                    function playGreet() {
                        motionManager.startMotion(live2dMotion);
                        console.log("▶️ 已強行觸發打招呼動作");
                    }

                    // 1. 一開啟網頁就立刻強行播放
                    setTimeout(playGreet, 500);

                    // 2. 點擊模型時也強行播放
                    model.interactive = true;
                    model.on('pointerdown', () => { 
                        playGreet();
                    });
                })
                .catch(motionErr => {
                    console.error("❌ 動作檔案直接載入失敗：", motionErr);
                });
            
        }).catch(err => {
            console.error("❌ 模型載入失敗：", err);
        });
    </script>
</body>
</html>
