<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Web V2 - Motion & Expression Edition</title>
    <style>
        /* 背景保持完美的透明，適合無縫嵌入 Wix */
        body { margin: 0; padding: 0; overflow: hidden; background: transparent; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
    
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const app = new PIXI.Application({
            view: document.getElementById('canvas'),
            autoStart: true,
            resizeTo: window,
            transparent: true 
        });

        // 精準對齊帶有半形空格的 V2 點菜單路徑，並加上時間戳記防快取
        const modelUrl = './models/Q版動態貼圖_鹿聆半夏/Q版動態貼圖_鹿聆半夏 _v2.model3.json?v=' + Date.now();

        PIXI.live2d.Live2DModel.from(modelUrl).then((model) => {
            app.stage.addChild(model);
            
            // 1. 模型畫面置中與動態縮放
            model.anchor.set(0.5, 0.5);
            model.x = window.innerWidth / 2;
            model.y = window.innerHeight / 2;
            const scale = Math.min(window.innerWidth / model.width, window.innerHeight / model.height) * 0.8;
            model.scale.set(scale);
            
            // 2. 萬能動作播放函式 (封裝安全機制，避免因為 Target: Parameter 報錯導致網頁當掉)
            function triggerMotion(groupName, index = 0) {
                try {
                    // 先檢查模型點菜單內是否真的有登記這個動作群組
                    if (model.internalModel.motionManager.motionGroups[groupName]) {
                        model.motion(groupName, index);
                        console.log(`▶️ 成功觸發動作群組: ${groupName}, 索引: ${index}`);
                    } else {
                        // 如果點菜單內沒找到，嘗試強行盲播第一個動作
                        model.motion(groupName);
                    }
                } catch (error) {
                    console.warn(`⚠️ 動作播放遭遇相容性衝突，可能受 Target: Parameter 格式影響:`, error);
                }
            }

            // 3. 萬能表情切換函式
            // 表情通常是 .exp3.json 檔案，如果你的模型有設定害羞、生氣、驚嚇等，可以用這個切換
            function triggerExpression(expressionId) {
                try {
                    if (model.internalModel.expressionManager) {
                        model.expression(expressionId);
                        console.log(`🎭 成功切換表情: ${expressionId}`);
                    }
                } catch (error) {
                    console.warn(`⚠️ 表情切換失敗，請確認 model3.json 中是否有登記 Expressions 欄位:`, error);
                }
            }

            // ✨ 【自動觸發】網頁一開啟，立刻執行打招呼動作！
            // 這裡會去讀取我們在 model3.json 裡面綁定的 "TapBody"
            setTimeout(() => {
                triggerMotion('TapBody', 0);
            }, 600);

            // 🖱️ 【點擊互動】當使用者用滑鼠點擊鹿聆半夏時
            model.interactive = true;
            model.on('pointerdown', () => { 
                // 點擊時再次播放打招呼
                triggerMotion('TapBody', 0); 
                
                /* 💡 擴充小教室：如果你未來有匯出表情檔（例如：shy.exp3.json）並登記在點菜單中
                  你可以把下面的註解拿掉，就能達到「點擊時一邊打招呼、一邊變換表情」的進階效果！
                  triggerExpression('shy'); 
                */
            });
            
        }).catch(err => {
            console.error("❌ 鹿聆半夏模型載入失敗，請檢查 F12 主控台詳細錯誤原因：", err);
        });
    </script>
</body>
</html>
